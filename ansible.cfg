[defaults]
remote_user = ansible
host_key_checking = false
fact_caching = jsonfile
fact_caching_connection = /tmp/facts_cache
library = library
gather_facts = true
interpreter_python = auto_silent
log_path = /var/log/ansible.log
deprecation_warnings = False
vault_password_file = .vault.pass

[connection]
#pipelining = true

[ssh_connection]
#pipelining = true
