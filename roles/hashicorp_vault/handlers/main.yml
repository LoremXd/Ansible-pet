---
# handlers file for hashicorp_vault

- name: Restart hashicorp vault container
  community.docker.docker_compose_v2:
    project_src: "{{ hashi_vault_path }}"
    state: restarted
  become: yes

- name: Unseal vault
  community.docker.docker_container_exec:
    container: "{{ hashi_vault_container_name }}"
    chdir: /vault
    command: sh unseal_vault.sh
  when: hashi_vault_unseal == true
